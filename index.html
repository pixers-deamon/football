<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BDIX IPTV - PlayZ TV</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid #e94560;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #e94560;
            margin-bottom: 10px;
        }

        header p {
            color: #a0a0a0;
            font-size: 1rem;
        }

        .search-bar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 250px;
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid #e94560;
        }

        .search-input::placeholder {
            color: #a0a0a0;
        }

        .filter-select {
            padding: 15px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 2px solid #e94560;
            cursor: pointer;
            min-width: 200px;
        }

        .filter-select option {
            background: #1a1a2e;
            color: #fff;
        }

        .channel-count {
            background: rgba(233, 69, 96, 0.2);
            padding: 15px 25px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 2px solid #e94560;
        }

        .channels-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .channel-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        .channel-card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
            background: rgba(255, 255, 255, 0.1);
        }

        .channel-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            margin-bottom: 15px;
            display: block;
        }

        .channel-name {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .channel-group {
            font-size: 0.9rem;
            color: #e94560;
            background: rgba(233, 69, 96, 0.2);
            padding: 5px 12px;
            border-radius: 20px;
            display: inline-block;
        }

        .play-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background: #e94560;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .play-btn:hover {
            background: #ff6b6b;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 30px;
            max-width: 900px;
            width: 90%;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 2rem;
            color: #e94560;
            cursor: pointer;
            background: none;
            border: none;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .modal-channel-info {
            text-align: center;
        }

        .modal-channel-name {
            font-size: 1.8rem;
            color: #e94560;
            margin-bottom: 10px;
        }

        .loading {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            color: #a0a0a0;
        }

        .error-message {
            background: rgba(255, 0, 0, 0.2);
            border: 2px solid #ff4444;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            color: #ff4444;
        }

        footer {
            text-align: center;
            padding: 30px;
            margin-top: 50px;
            border-top: 2px solid #e94560;
            color: #a0a0a0;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8rem;
            }

            .channels-grid {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .search-bar {
                flex-direction: column;
            }

            .search-input,
            .filter-select {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📺 BDIX IPTV</h1>
            <p>Developed By: ABU SAEEiD × Rifaz | Telegram: @xfireflixbd</p>
        </header>

        <div id="error-container"></div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="Search channels...">
            <select class="filter-select" id="groupFilter">
                <option value="">All Groups</option>
            </select>
        </div>

        <div class="channel-count">
            <strong>Total Channels:</strong> <span id="channelCount">0</span>
        </div>

        <div class="channels-grid" id="channelsGrid">
            <div class="loading">Loading channels...</div>
        </div>

        <footer>
            <p>Disclaimer: This tool does NOT host any content. It aggregates publicly available data for informational purposes only.</p>
            <p>Last Updated: <span id="lastUpdated"></span></p>
        </footer>
    </div>

    <!-- Video Modal -->
    <div class="modal" id="videoModal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">&times;</button>
            <div class="video-container">
                <video id="videoPlayer" controls autoplay></video>
            </div>
            <div class="modal-channel-info">
                <h2 class="modal-channel-name" id="modalChannelName"></h2>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        let allChannels = [];
        let filteredChannels = [];

        // Parse M3U playlist
        function parseM3U(content) {
            const lines = content.split('\n');
            const channels = [];
            let currentChannel = {};

            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                if (line.startsWith('#EXTINF:')) {
                    currentChannel = {};
                    
                    // Extract channel name (after the last comma)
                    const nameMatch = line.match(/,(.+)$/);
                    if (nameMatch) {
                        currentChannel.name = nameMatch[1].trim();
                    }
                    
                    // Extract group-title
                    const groupMatch = line.match(/group-title="([^"]*)"/);
                    if (groupMatch) {
                        currentChannel.group = groupMatch[1];
                    }
                    
                    // Extract tvg-logo
                    const logoMatch = line.match(/tvg-logo="([^"]*)"/);
                    if (logoMatch) {
                        currentChannel.logo = logoMatch[1];
                    }
                    
                    // Extract tvgo (alternative logo)
                    const tvgoMatch = line.match(/tvgo="([^"]*)"/);
                    if (tvgoMatch && !currentChannel.logo) {
                        currentChannel.logo = tvgoMatch[1];
                    }
                    
                } else if (line && !line.startsWith('#') && currentChannel.name) {
                    currentChannel.url = line;
                    channels.push(currentChannel);
                    currentChannel = {};
                }
            }

            return channels;
        }

        // Load and parse playlist
        async function loadPlaylist() {
            try {
                const response = await fetch('playlist.m3u');
                if (!response.ok) {
                    throw new Error('Failed to load playlist');
                }
                
                const content = await response.text();
                allChannels = parseM3U(content);
                
                // Extract last updated date from content
                const lastUpdatedMatch = content.match(/Last Updated:\s*(.+)/);
                if (lastUpdatedMatch) {
                    document.getElementById('lastUpdated').textContent = lastUpdatedMatch[1].trim();
                }
                
                filteredChannels = [...allChannels];
                updateChannelCount();
                populateGroupFilter();
                renderChannels();
                
            } catch (error) {
                console.error('Error loading playlist:', error);
                document.getElementById('channelsGrid').innerHTML = `
                    <div class="error-message">
                        Error loading playlist: ${error.message}<br>
                        Please ensure the playlist.m3u file is in the same directory.
                    </div>
                `;
            }
        }

        // Update channel count display
        function updateChannelCount() {
            document.getElementById('channelCount').textContent = filteredChannels.length;
        }

        // Populate group filter dropdown
        function populateGroupFilter() {
            const groups = [...new Set(allChannels.map(ch => ch.group).filter(g => g))];
            groups.sort();
            
            const select = document.getElementById('groupFilter');
            groups.forEach(group => {
                const option = document.createElement('option');
                option.value = group;
                option.textContent = group;
                select.appendChild(option);
            });
        }

        // Render channels to grid
        function renderChannels() {
            const grid = document.getElementById('channelsGrid');
            
            if (filteredChannels.length === 0) {
                grid.innerHTML = '<div class="loading">No channels found</div>';
                return;
            }
            
            grid.innerHTML = filteredChannels.map((channel, index) => `
                <div class="channel-card" onclick="openChannel(${index})">
                    <img src="${channel.logo || 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiBmaWxsPSIjMkEyQTJFIi8+Cjx0ZXh0IHg9IjQwIiB5PSI0NSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI0U5NDU2MCIgZm9udC1zaXplPSIzMCIgZm9udC1mYW1pbHk9IkFyaWFsIj7wn5OUPC90ZXh0Pgo8L3N2Zz4K'}" 
                         alt="${channel.name}" 
                         class="channel-logo"
                         onerror="this.src='data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iODAiIGhlaWdodD0iODAiIHZpZXdCb3g9IjAgMCA4MCA4MCIgZmlsbD0ibm9uZSIgeG1sbnM9Imh0dHA6Ly93d3cudzMub3JnLzIwMDAvc3ZnIj4KPHJlY3Qgd2lkdGg9IjgwIiBoZWlnaHQ9IjgwIiBmaWxsPSIjMkEyQTJFIi8+Cjx0ZXh0IHg9IjQwIiB5PSI0NSIgdGV4dC1hbmNob3I9Im1pZGRsZSIgZmlsbD0iI0U5NDU2MCIgZm9udC1zaXplPSIzMCIgZm9udC1mYW1pbHk9IkFyaWFsIj7wn5OUPC90ZXh0Pgo8L3N2Zz4K'">
                    <div class="channel-name">${channel.name}</div>
                    ${channel.group ? `<div class="channel-group">${channel.group}</div>` : ''}
                    <button class="play-btn">▶ Play Channel</button>
                </div>
            `).join('');
        }

        // Open channel in modal
        function openChannel(index) {
            const channel = filteredChannels[index];
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            const channelName = document.getElementById('modalChannelName');
            
            channelName.textContent = channel.name;
            modal.classList.add('active');
            
            // Initialize HLS player
            if (Hls.isSupported()) {
                const hls = new Hls();
                hls.loadSource(channel.url);
                hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().catch(e => console.log('Auto-play prevented:', e));
                });
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = channel.url;
                video.addEventListener('loadedmetadata', function() {
                    video.play().catch(e => console.log('Auto-play prevented:', e));
                });
            }
        }

        // Close modal
        function closeModal() {
            const modal = document.getElementById('videoModal');
            const video = document.getElementById('videoPlayer');
            
            video.pause();
            video.src = '';
            modal.classList.remove('active');
        }

        // Filter channels
        function filterChannels() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const selectedGroup = document.getElementById('groupFilter').value;
            
            filteredChannels = allChannels.filter(channel => {
                const matchesSearch = channel.name.toLowerCase().includes(searchTerm);
                const matchesGroup = !selectedGroup || channel.group === selectedGroup;
                return matchesSearch && matchesGroup;
            });
            
            updateChannelCount();
            renderChannels();
        }

        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterChannels);
        document.getElementById('groupFilter').addEventListener('change', filterChannels);

        // Close modal on outside click
        document.getElementById('videoModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        // Close modal on Escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });

        // Initialize
        loadPlaylist();
    </script>
</body>
</html>
